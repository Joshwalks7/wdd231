<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Test</title>
</head>
<body>
    <input type="checkbox" id="checkbox">
    <label for="checkbox">OPEN</label>
    <div class="openMessage"></div>
    <script>
        const checkbox = document.getElementById("checkbox");
        const message = document.querySelector(".openMessage");
        
        function updateMessage() {
            const isOpen = checkbox.checked;
            message.textContent = isOpen ? "The park is open" : "The Park is closed";
        };
        updateMessage();
        checkbox.addEventListener("change", updateMessage);
       

    </script>
</body>
</html>
